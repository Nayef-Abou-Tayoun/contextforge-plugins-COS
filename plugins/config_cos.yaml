# Simple Tool Cost Tracker Plugin Configuration for COS
# Perfect for bootcamp demonstrations!

# Plugin directories to scan
plugin_dirs:
  - "plugins"

# Global plugin settings
plugin_settings:
  parallel_execution_within_band: true
  plugin_timeout: 120
  fail_on_plugin_error: false
  enable_plugin_api: true
  plugin_health_check_interval: 120
  include_user_info: false

plugins:
  # NA PII Filter Plugin - Enhanced PII detection with MAC address support
  - name: na_pii_filter_plugin
    kind: "na_pii_filter_plugin.NA_PIIFilterPlugin"
    enabled: true
    config:
      # Masking strategies: partial, redact, hash, remove
      default_mask_strategy: "partial"
      
      # Per-type masking strategies
      mask_strategies:
        mac_address: "partial"      # Show first and last octet
        email: "partial"             # Show first/last chars
        ssn: "redact"                # Replace with [REDACTED]
        credit_card: "partial"       # Show first/last digits
        phone: "partial"             # Show area code and last 4
      
      # Detection toggles
      detect_mac_address: true
      detect_email: true
      detect_ssn: true
      detect_credit_card: true
      detect_phone: true
      
      # Behavior
      redaction_text: "[REDACTED]"
      block_on_detection: false     # Set true to block requests with PII
      log_detections: true          # Log when PII is detected
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke
      - prompt_pre_fetch
      - prompt_post_fetch

  # Cost Analysis Plugin - Comprehensive token tracking and budget management
  - name: cost_analysis
    kind: "cost_analysis_plugin.CostAnalysisPlugin"
    enabled: true
    config:
      # Pricing configuration (cost per 1,000 tokens)
      pricing:
        input_cost_per_1k: 0.01    # $0.01 per 1K input tokens
        output_cost_per_1k: 0.03   # $0.03 per 1K output tokens
      
      # Budget limits (in USD)
      budgets:
        daily_limit: 100.0          # $100 total daily budget
        monthly_limit: 3000.0       # $3000 total monthly budget
        per_user_daily_limit: 10.0  # $10 per user daily budget
      
      # Alert configuration
      alerts:
        warning_threshold: 0.75     # Warn at 75% of budget
        critical_threshold: 0.90    # Critical alert at 90% of budget
        block_on_exceeded: false    # Don't block requests when budget exceeded
        webhook_url: null           # Optional: Slack/Teams webhook URL
        email: null                 # Optional: Email for alerts
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke

