# Simple Tool Cost Tracker Plugin Configuration for COS
# Perfect for bootcamp demonstrations!

# Plugin directories to scan
plugin_dirs:
  - "plugins"

# Global plugin settings
plugin_settings:
  parallel_execution_within_band: true
  plugin_timeout: 120
  fail_on_plugin_error: false
  enable_plugin_api: true
  plugin_health_check_interval: 120
  include_user_info: false

plugins:
  # Tool Cost Tracker Plugin - Simple bootcamp demo plugin
  - name: tool_cost_tracker
    kind: "tool_cost_tracker.ToolCostTrackerPlugin"
    enabled: true
    config:
      default_cost_per_call: 0.01  # $0.01 per call
      tool_costs:
        expensive_api: 0.10
        database_query: 0.05
        file_operation: 0.001
        hello: 0.001  # Simple hello tool - minimal cost
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke

  # Hello Plugin - Simple greeting plugin for demos
  - name: hello_plugin
    kind: "hello_plugin.HelloPlugin"
    enabled: true
    config:
      greeting: "Hello"
      add_emoji: true
      log_greetings: true
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke

  # NA PII Filter Plugin - Enhanced PII detection with MAC address support
  - name: na_pii_filter_plugin
    kind: "na_pii_filter_plugin.NA_PIIFilterPlugin"
    enabled: true
    config:
      # Masking strategies: partial, redact, hash, remove
      default_mask_strategy: "partial"
      
      # Per-type masking strategies
      mask_strategies:
        mac_address: "partial"      # Show first and last octet
        email: "partial"             # Show first/last chars
        ssn: "redact"                # Replace with [REDACTED]
        credit_card: "partial"       # Show first/last digits
        phone: "partial"             # Show area code and last 4
      
      # Detection toggles
      detect_mac_address: true
      detect_email: true
      detect_ssn: true
      detect_credit_card: true
      detect_phone: true
      
      # Behavior
      redaction_text: "[REDACTED]"
      block_on_detection: false     # Set true to block requests with PII
      log_detections: true          # Log when PII is detected
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke
      - prompt_pre_fetch
      - prompt_post_fetch

  # How Are You Doing Plugin - Friendly conversational plugin
  - name: how_are_you_doing
    kind: "how_are_you_plugin.HowAreYouDoingPlugin"
    enabled: true
    config:
      add_greeting: true              # Add "How are you doing?" before tools
      add_encouragement: true         # Add encouraging messages after tools
      use_random_messages: true       # Use random variations of messages
      custom_greeting: null           # Optional: Set custom greeting message
      custom_encouragement: null      # Optional: Set custom encouragement message
      log_interactions: true          # Log friendly messages
    
    hooks:
      - tool_pre_invoke
      - tool_post_invoke

